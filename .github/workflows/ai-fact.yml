name: Update AI Fact of the Day

# Run once a day at 09:00 UTC (adjust as you like) and also on workflow_dispatch for manual triggers
on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 09:00 UTC
  workflow_dispatch:

jobs:
  update-fact:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push changes to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch a random AI fact
        id: fact
        run: |
          # Using the free "useless facts" API – you can replace with any other source.
          FACT=$(curl -s https://uselessfacts.jsph.pl/random.json?language=en | jq -r .text)
          echo "fact<<EOF" >> $GITHUB_OUTPUT
          echo "$FACT"
          echo "EOF"

      - name: Replace placeholder in README
        run: |
          FACT="${{ steps.fact.outputs.fact }}"
          # Use sed to swap the content between the markers
          sed -i "/<!-- AI_FACT_START -->/,/<!-- AI_FACT_END -->/{
            /<!-- AI_FACT_START -->/!{
              /<!-- AI_FACT_END -->/!d
            }
          }" README.md
          # Insert the fact after the start marker and before the end marker
          awk -v fact="$FACT" '
            /<!-- AI_FACT_START -->/ { print; print fact; next }
            /<!-- AI_FACT_END -->/   { print; next }
            { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Update AI Fact of the Day: ${{ steps.fact.outputs.fact }}"
            git push
          else
            echo "No change in fact – skipping commit."
          fi